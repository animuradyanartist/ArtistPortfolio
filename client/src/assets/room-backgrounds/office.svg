<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Wall -->
  <rect width="800" height="600" fill="#f1f5f9"/>
  
  <!-- Floor -->
  <rect x="0" y="450" width="800" height="150" fill="#cbd5e1"/>
  
  <!-- Desk -->
  <rect x="100" y="380" width="180" height="80" rx="5" fill="#64748b"/>
  <rect x="80" y="440" width="10" height="20" fill="#475569"/>
  <rect x="270" y="440" width="10" height="20" fill="#475569"/>
  
  <!-- Chair -->
  <rect x="200" y="300" width="60" height="80" rx="5" fill="#374151"/>
  <rect x="215" y="290" width="30" height="20" rx="5" fill="#1f2937"/>
  
  <!-- Computer -->
  <rect x="120" y="350" width="80" height="50" rx="5" fill="#111827"/>
  <rect x="125" y="355" width="70" height="40" fill="#1e40af"/>
  
  <!-- Keyboard -->
  <rect x="150" y="400" width="60" height="15" rx="2" fill="#6b7280"/>
  
  <!-- Bookshelf -->
  <rect x="600" y="100" width="150" height="300" rx="5" fill="#8b5cf6"/>
  <rect x="610" y="120" width="130" height="8" fill="#a78bfa"/>
  <rect x="610" y="180" width="130" height="8" fill="#a78bfa"/>
  <rect x="610" y="240" width="130" height="8" fill="#a78bfa"/>
  <rect x="610" y="300" width="130" height="8" fill="#a78bfa"/>
  <rect x="610" y="360" width="130" height="8" fill="#a78bfa"/>
  
  <!-- Books -->
  <rect x="620" y="140" width="15" height="30" fill="#ef4444"/>
  <rect x="640" y="140" width="12" height="30" fill="#10b981"/>
  <rect x="660" y="140" width="18" height="30" fill="#3b82f6"/>
  
  <!-- Wall Art Area (where artwork will be placed) -->
  <rect x="300" y="120" width="260" height="180" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Plant -->
  <ellipse cx="50" cy="430" rx="25" ry="30" fill="#10b981"/>
  <rect x="35" y="450" width="30" height="15" fill="#8b5cf6"/>
  
  <!-- Window -->
  <rect x="400" y="50" width="120" height="150" rx="5" fill="#dbeafe" stroke="#9ca3af" stroke-width="2"/>
  <line x1="460" y1="50" x2="460" y2="200" stroke="#9ca3af" stroke-width="2"/>
</svg>