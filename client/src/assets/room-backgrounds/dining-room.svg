<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Wall -->
  <rect width="800" height="600" fill="#fefbf3"/>
  
  <!-- Floor -->
  <rect x="0" y="450" width="800" height="150" fill="#e7e5e4"/>
  
  <!-- Dining Table -->
  <ellipse cx="400" cy="380" rx="120" ry="60" fill="#8b5cf6"/>
  
  <!-- Chairs -->
  <rect x="280" y="320" width="40" height="60" rx="5" fill="#6b46c1"/>
  <rect x="280" y="310" width="40" height="15" rx="5" fill="#553c9a"/>
  
  <rect x="480" y="320" width="40" height="60" rx="5" fill="#6b46c1"/>
  <rect x="480" y="310" width="40" height="15" rx="5" fill="#553c9a"/>
  
  <rect x="380" y="280" width="40" height="60" rx="5" fill="#6b46c1"/>
  <rect x="380" y="270" width="40" height="15" rx="5" fill="#553c9a"/>
  
  <rect x="380" y="420" width="40" height="60" rx="5" fill="#6b46c1"/>
  <rect x="380" y="410" width="40" height="15" rx="5" fill="#553c9a"/>
  
  <!-- Chandelier -->
  <circle cx="400" cy="200" r="20" fill="#fbbf24"/>
  <circle cx="400" cy="200" r="15" fill="#f59e0b"/>
  <rect x="395" y="180" width="10" height="20" fill="#374151"/>
  
  <!-- Sideboard -->
  <rect x="50" y="350" width="180" height="80" rx="5" fill="#a78bfa"/>
  <rect x="70" y="330" width="20" height="20" fill="#8b5cf6"/>
  <rect x="130" y="330" width="20" height="20" fill="#8b5cf6"/>
  <rect x="190" y="330" width="20" height="20" fill="#8b5cf6"/>
  
  <!-- Wall Art Area (where artwork will be placed) -->
  <rect x="550" y="120" width="200" height="160" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Window -->
  <rect x="100" y="50" width="140" height="180" rx="8" fill="#dbeafe" stroke="#9ca3af" stroke-width="2"/>
  <line x1="170" y1="50" x2="170" y2="230" stroke="#9ca3af" stroke-width="2"/>
  <line x1="100" y1="140" x2="240" y2="140" stroke="#9ca3af" stroke-width="2"/>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="370" r="8" fill="#fbbf24"/>
  <circle cx="180" cy="370" r="8" fill="#fbbf24"/>
</svg>