<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Wall -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Floor -->
  <rect x="0" y="450" width="800" height="150" fill="#e8dcc6"/>
  
  <!-- Sofa -->
  <rect x="100" y="400" width="200" height="80" rx="10" fill="#6b7280"/>
  <rect x="90" y="380" width="220" height="20" rx="10" fill="#4b5563"/>
  
  <!-- Coffee Table -->
  <rect x="150" y="350" width="100" height="40" rx="5" fill="#8b5cf6"/>
  
  <!-- Side Table -->
  <rect x="320" y="420" width="60" height="50" rx="5" fill="#a78bfa"/>
  
  <!-- Lamp -->
  <circle cx="350" cy="410" r="15" fill="#fbbf24"/>
  <rect x="345" y="370" width="10" height="40" fill="#374151"/>
  
  <!-- Window -->
  <rect x="600" y="50" width="150" height="200" rx="10" fill="#dbeafe" stroke="#9ca3af" stroke-width="2"/>
  <line x1="675" y1="50" x2="675" y2="250" stroke="#9ca3af" stroke-width="2"/>
  <line x1="600" y1="150" x2="750" y2="150" stroke="#9ca3af" stroke-width="2"/>
  
  <!-- Wall Art Area (where artwork will be placed) -->
  <rect x="200" y="100" width="300" height="200" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Plant -->
  <ellipse cx="50" cy="440" rx="30" ry="40" fill="#10b981"/>
  <rect x="35" y="460" width="30" height="20" fill="#8b5cf6"/>
</svg>